general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # CAMBIA ESTA RUTA por una imagen que tengas, por ejemplo:
    path = /home/$USER/Imágenes/wallpaper.jpg 
    color = rgba(0, 0, 105, 1)
    #blur_passes = 3 # Más pases = más desenfoque
    #blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# RELOJ
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Cantarell Bold
    position = 0, 80
    halign = center
    valign = center
}

# INPUT FIELD (Caja de contraseña)
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Hola, $USER...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
